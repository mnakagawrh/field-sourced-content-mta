{{- if .Values.operator3.enabled }}
{{/* Always render OG + Subscription (no Helm lookup — avoids ArgoCD prune deleting OLM on resync). */}}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operator3.name }}-og
  namespace: {{ .Values.operator3.namespace }}
spec:
  targetNamespaces:
    - {{ .Values.operator3.namespace }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator3.name }}
  namespace: {{ .Values.operator3.namespace }}
  labels:
    demo.redhat.com/application: "operator3"
spec:
  channel: {{ .Values.operator3.channel }}
  installPlanApproval: {{ .Values.operator3.installPlanApproval }}
  name: {{ .Values.operator3.name }}
  source: {{ .Values.operator3.source }}
  sourceNamespace: {{ .Values.operator3.sourceNamespace }}
{{- end }}
