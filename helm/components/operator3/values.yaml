# Operator installation via OLM
operator3:
  # Set to true to install the operator
  # Set to false if operator is already installed on cluster
  enabled: true
  name: devspaces
  # OpenShift: Dev Spaces operator は openshift-operators（AllNamespaces / global OperatorGroup）
  namespace: openshift-operators
  channel: stable
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic