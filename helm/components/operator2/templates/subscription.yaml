{{- if .Values.operator2.enabled }}
{{/* Always render OG + Subscription (no Helm lookup — avoids ArgoCD prune deleting OLM on resync). */}}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operator2.name }}-og
  namespace: {{ .Values.operator2.namespace }}
spec:
  targetNamespaces:
    - {{ .Values.operator2.namespace }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator2.name }}
  namespace: {{ .Values.operator2.namespace }}
  labels:
    demo.redhat.com/application: "operator2"
spec:
  channel: {{ .Values.operator2.channel }}
  installPlanApproval: {{ .Values.operator2.installPlanApproval }}
  name: {{ .Values.operator2.name }}
  source: {{ .Values.operator2.source }}
  sourceNamespace: {{ .Values.operator2.sourceNamespace }}
{{- end }}
