{{- if .Values.operator1.enabled }}
{{- $existingSub := lookup "operators.coreos.com/v1alpha1" "Subscription" .Values.operator1.namespace .Values.operator1.name }}
{{- if not $existingSub.metadata }}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operator1.name }}-og
  namespace: {{ .Values.operator1.namespace }}
spec:
  # targetNamespaces を指定しない、または自身の Namespace を指定することで
  # その Namespace 内で Operator が動作するようになります
  targetNamespaces:
    - {{ .Values.operator1.namespace }}
---
# Install operator via OLM Subscription
# Skipped automatically if subscription already exists
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator1.name }}
  namespace: {{ .Values.operator1.namespace }}
  labels:
    demo.redhat.com/application: "operator1"
spec:
  channel: {{ .Values.operator1.channel }}
  installPlanApproval: {{ .Values.operator1.installPlanApproval }}
  name: {{ .Values.operator1.name }}
  source: {{ .Values.operator1.source }}
  sourceNamespace: {{ .Values.operator1.sourceNamespace }}
{{- end }}
---
# Tackle CR - 常に適用（Solution Server など spec の変更を反映）
kind: Tackle
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  name: tackle
  namespace: {{ .Values.operator1.namespace }}
spec:
  rwx_supported: "false"
  feature_auth_required: "false"
  {{- if and .Values.operator1.solutionServer .Values.operator1.solutionServer.enabled }}
  # Solution Server (Konveyor AI) 設定
  # https://konveyor.io/docs/konveyor/kai/solutionserver/
  kai_solution_server_enabled: true
  kai_llm_provider: {{ .Values.operator1.solutionServer.llmProvider | default "openai" | quote }}
  {{- if .Values.operator1.solutionServer.llmModel }}
  kai_llm_model: {{ .Values.operator1.solutionServer.llmModel | quote }}
  {{- end }}
  {{- if .Values.operator1.solutionServer.llmBaseUrl }}
  kai_llm_baseurl: {{ .Values.operator1.solutionServer.llmBaseUrl | quote }}
  {{- end }}
  {{- end }}
{{- end }}
