{{- if and .Values.operator1.solutionServer .Values.operator1.solutionServer.enabled .Values.operator1.solutionServer.apiKey }}
# kai-api-keys: Solution Server 用 LLM API キー
# 注意: 本番では Sealed Secrets / External Secrets の利用を推奨
# 手動作成: kubectl create secret generic kai-api-keys -n konveyor-ai \
#   --from-literal=OPENAI_API_KEY='<YOUR_KEY>' \
#   [--from-literal=OPENAI_API_BASE='https://...']  # OpenAI 互換 API 用
---
apiVersion: v1
kind: Namespace
metadata:
  name: konveyor-ai
---
apiVersion: v1
kind: Secret
metadata:
  name: kai-api-keys
  namespace: konveyor-ai
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.operator1.solutionServer.apiKey | quote }}
  {{- if .Values.operator1.solutionServer.llmBaseUrl }}
  OPENAI_API_BASE: {{ .Values.operator1.solutionServer.llmBaseUrl | quote }}
  {{- end }}
{{- end }}
