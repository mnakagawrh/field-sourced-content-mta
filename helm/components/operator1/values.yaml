# Operator installation via OLM
operator1:
  # Set to true to install the operator
  # Set to false if operator is already installed on cluster
  enabled: true
  name: konveyor-operator
  namespace: konveyor-tackle
  channel: konveyor-0.9
  source: community-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic

  # Solution Server (Konveyor AI) - MCP サーバーで AI によるソリューション提案を有効化
  # https://konveyor.io/docs/konveyor/kai/solutionserver/
  solutionServer:
    # 有効にする場合は true、無効なら false または削除
    enabled: false
    # LLM プロバイダー: openai, azure_openai, bedrock, google, ollama など
    llmProvider: "openai"
    # 使用するモデル名（オプション）
    llmModel: "gpt-4o-mini"
    # OpenAI 互換 API 用の base URL（Parasol MaaS など社内 LLM 利用時）
    # llmBaseUrl: ""
    # --- API キー（次のいずれか）---
    # apiKey: ""              # 設定すると Helm が kai-api-keys Secret を konveyor-tackle に作成（Git に載せないこと）
    # existingSecretName: ""  # 既に作成済みの Secret 名（SealedSecret 等）。設定時は apiKey は不要
