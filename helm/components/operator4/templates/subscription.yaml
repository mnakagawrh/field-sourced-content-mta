{{- if .Values.operator4.enabled }}
{{- $existingSub := lookup "operators.coreos.com/v1alpha1" "Subscription" .Values.operator4.namespace .Values.operator4.name }}
{{- if not $existingSub.metadata }}
---
# Install operator via OLM Subscription
# Skipped automatically if subscription already exists
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator4.name }}
  namespace: {{ .Values.operator4.namespace }}
  labels:
    demo.redhat.com/application: "operator4"
spec:
  channel: {{ .Values.operator4.channel }}
  installPlanApproval: {{ .Values.operator4.installPlanApproval }}
  name: {{ .Values.operator4.name }}
  source: {{ .Values.operator4.source }}
  sourceNamespace: {{ .Values.operator4.sourceNamespace }}
{{- end }}
{{- end }}
