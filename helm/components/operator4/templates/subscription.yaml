{{- if .Values.operator4.enabled }}
{{/* Always render OG + Subscription (no Helm lookup — avoids ArgoCD prune deleting OLM on resync). */}}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operator4.name }}-og
  namespace: {{ .Values.operator4.namespace }}
spec:
  targetNamespaces:
    - {{ .Values.operator4.namespace }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operator4.name }}
  namespace: {{ .Values.operator4.namespace }}
  labels:
    demo.redhat.com/application: "operator4"
spec:
  channel: {{ .Values.operator4.channel }}
  installPlanApproval: {{ .Values.operator4.installPlanApproval }}
  name: {{ .Values.operator4.name }}
  source: {{ .Values.operator4.source }}
  sourceNamespace: {{ .Values.operator4.sourceNamespace }}
{{- end }}
