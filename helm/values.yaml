# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts
  repoUrl: "https://github.com/mnakagawrh/field-sourced-content-mta.git"
  revision: "main"
  basePath: "helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation ---
  operator1:
    enabled: true
    name: konveyor-operator
    namespace: konveyor-tackle
    channel: konveyor-0.9
    source: community-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
    # Solution Server — API Key は Secret のみ。モデル・URL は確定後にコメント解除して push
    # 手順: helm/docs/operator1-solution-server-inject-later.md
    solutionServer:
      enabled: false   # LLMの情報が揃ったら true に
      # 以下、確定したらコメントを外して値を整える、Gitのpush前にSecret（kai-api-keys）を作っておく
      # llmProvider: "openai"
      # llmModel: "your-model-name"
      # llmBaseUrl: "https://your-maas.example.com/v1"
      # existingSecretName: kai-api-keys
  operator2:
    enabled: true
    name: cloudnative-pg
    namespace: cnpg-system
    channel: stable-v1
    source: certified-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
  operator3:
    enabled: true
    name: devspaces
    namespace: openshift-operators
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
  operator4:
    enabled: true
    name: rhbk-operator
    namespace: keycloak-operator
    channel: stable-v26
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic


# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
