# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts
  repoUrl: "https://github.com/mnakagawrh/field-sourced-content-mta.git"
  revision: "main"
  basePath: "helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation ---
  operator1:
    enabled: true
    name: konveyor-operator
    namespace: konveyor-tackle
    channel: konveyor-0.9
    source: community-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
    # Solution Server (Konveyor AI) - 有効化で kai-* Pod が konveyor-ai namespace にデプロイされる
    solutionServer:
      enabled: true
      llmProvider: "openai"
      llmModel: "llama-4-scout-17b-16e-w4a16"  # Parasol MaaS のモデル名
      llmBaseUrl: "https://llama-4-scout-17b-16e-w4a16-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com/v1"
  operator2:
    enabled: true
    name: cloudnative-pg
    namespace: cnpg-system
    channel: stable-v1
    source: certified-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
  operator3:
    enabled: true
    name: devspaces
    namespace: openshift-devspaces
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
  operator4:
    enabled: true
    name: rhbk-operator
    namespace: keycloak-operator
    channel: stable-v26
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic


# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
