# App of Apps Pattern
# This template generates ArgoCD Applications for each enabled component

{{- if .Values.components.operator1.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-operator1
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content-operator1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/operator1
    helm:
      valuesObject:
        operator1:
          enabled: {{ .Values.components.operator1.enabled }}
          name: {{ .Values.components.operator1.name }}
          namespace: {{ .Values.components.operator1.namespace }}
          channel: {{ .Values.components.operator1.channel }}
          source: {{ .Values.components.operator1.source }}
          sourceNamespace: {{ .Values.components.operator1.sourceNamespace }}
          installPlanApproval: {{ .Values.components.operator1.installPlanApproval }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.operator1.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}

